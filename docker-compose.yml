services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ts-boilerplate-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      # override MONGO_URI ให้ชี้ไปที่ service name "mongodb" แทน localhost
      MONGO_URI: 'mongodb://${MONGO_INITDB_ROOT_USERNAME:-root}:${MONGO_INITDB_ROOT_PASSWORD:-password}@mongodb:27017/?authSource=admin'
    depends_on:
      mongodb:
        condition: service_healthy   # รอ mongo healthcheck ผ่านก่อนค่อย start api
    networks:
      - mongodb_network

  mongodb:
    image: mongo:latest
    container_name: ts-boilerplate-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: '${MONGO_INITDB_ROOT_USERNAME:-root}'
      MONGO_INITDB_ROOT_PASSWORD: '${MONGO_INITDB_ROOT_PASSWORD:-password}'
    volumes:
      - mongodb-data:/data/db
      - mongodb-log:/var/log/mongodb
    ports:
      - '27017:27017'
    healthcheck:
      test: ['CMD-SHELL', "mongosh --eval 'db.runCommand({ ping: 1 })' --quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mongodb_network

volumes:
  mongodb-data:
    driver: local
  mongodb-log:
    driver: local

networks:
  mongodb_network:
    driver: bridge